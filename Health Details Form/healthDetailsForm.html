<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Details Form</title>
</head>
<body>
    <main>
        <h1>Health Details Form</h1>
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <Label for="name">Full Name:</Label>
                <input type="text" name="pname" id="name" required>
                <br><br>
                <label for="dob">Date Of Birth:</label>
                <input type="date" required id="dob">
                <br><br>
                <label for="gender">Gender:</label>
                <select name="pgender" id="gender">
                    <option value="" disabled selected>Choose Your Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <br><br>
                <label for="pnumber">Phone Number:</label>
                <input type="tel" required id="pnumber" name="pnumberr">
            </fieldset>

            <fieldset>
                <legend>Medical History</legend>
                <label for="Bgroup">Blood Group:</label>
                <select name="pbgroup" id="Bgroup">
                    <option value="" disabled selected>Choose Your Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <br><br>
                <label for="forLence">Do you wear glasses or contact lenses?</label>
                <br>
                <input type="radio" name="eye" id="yes" value="yes">
                <label for="yes">Yes</label>
                <br>
                <input type="radio" name="eye" id="no" value="no">
                <label for="no">No</label>

                <br><br>
                <label for="conditiontill">Pre-exixting Conditions:</label>
                <br>
                <textarea name="pcondition" id="conditiontill" cols="50" rows="4" placeholder="Please list any pre-existing medical conditions, allergies, or injuries that may affect your ability to exercise safely."></textarea>
                <br><br>
                <label>Allergies:</label>
                <br>
                <input type="checkbox" name="allergies" id="Pollen"  value="pollen">
                <label for="Pollen">Pollen</label>
                <br>
                <input type="checkbox" name="allergies" id="Dust" value="dust" >
                <label for="Dust">Dust</label>
                <br>
                <input type="checkbox" name="allergies" id="Food" value="food" >
                <label for="Food">Food</label>
                <br>
                <input type="checkbox" name="allergies" id="None" value="none" >
                <label for="None">None</label>
                <br><br>
                <label for="meditation">Current Medications:</label>
                <br>
                <textarea name="pmeditation" id="meditation" cols="50" rows="4" placeholder="List of any current meditations"></textarea>
            </fieldset>

            <fieldset>
                <legend>Emergency Contact</legend>
                <label for="ename">Emergency ContactName:</label>
                <input type="text" name="ename" id="ename" required>
                <br><br>
                <label for="erelation">Relationship to Emergency Contact:</label>
                <input type="text" name="erelation" id="erelation" required>
                <br><br>
                <label for="ephone">Emergency Contact Phone:</label>
                <input type="tel" name="ephone" id="ephone" required>
            </fieldset>
            <br>
            <button>Submit</button>
        </form>
    </main>
</body>
</html>
